# 1. Nginx Block
nginx:
  nodeSelector:
    app: oneuptime-core

# 2. PostgreSQL Block
postgresql:
  primary:
    nodeSelector:
      app: oneuptime-core

# Other databases (Clickhouse, Redis, etc. follow the same pattern)
clickhouse:
  nodeSelector:
    app: oneuptime-core

redis:
  master:
    nodeSelector:
      app: oneuptime-core

# 5. App and Worker Blocks
app:
  nodeSelector:
    app: oneuptime-core

worker:
  nodeSelector:
    app: oneuptime-core


probes:
  one:
    nodeSelector:
      app: oneuptime-core

# WARNING: In your code, "- oneuptime-probe host: localhost:8080" was on the same line; this is a YAML syntax error.
# host and httpProtocol are most likely separate parts of the root or probe configuration.
host: "localhost:8080"
httpProtocol: http
