host: "localhost:8080"
httpProtocol: http

# 1. Nginx Bloğu
nginx:
  nodeSelector:
    app: oneuptime-core

# 2. PostgreSQL Bloğu
postgresql:
  primary:
    nodeSelector:
      app: oneuptime-core

# 3. ClickHouse Bloğu
clickhouse:
  nodeSelector:
    app: oneuptime-core
  enabled: false

# 4. Redis Bloğu
redis:
  master:
    nodeSelector:
      app: oneuptime-core

# 5. App ve Worker Blokları
app:
  nodeSelector:
    app: oneuptime-core
    
worker:
  nodeSelector:
    app: oneuptime-core

# 6. Veritabanı Migrasyon Job'ı
migrate:
  nodeSelector:
    app: oneuptime-core

# 7. Varsayılan (Default) Probe
probes:
  one:
    # ... mevcut diğer ayarlar (name, description vb.) ...
    nodeSelector:
      app: oneuptime-core
  
